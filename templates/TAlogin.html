{% extends 'index.html' %}

{% block nav %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 px-lg-5 py-3 py-lg-0">
    <a href="" class="navbar-brand p-0">
        <h1 class="text-primary m-0"><i class="fa fa-utensils me-3"></i>DSSE</h1>
        <!-- <img src="/static/img/logo.png" alt="Logo"> -->
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="fa fa-bars"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto py-0 pe-4">
            <a href="{% url 'index' %}" class="nav-item nav-link ">Home</a>
            <a href="{% url 'Patient_Login'%}" class="nav-item nav-link">Patients</a>
            <a href="{% url 'Doctor_Login' %}" class="nav-item nav-link ">Doctors</a>
            <a href="{% url 'TAlogin' %}" class="nav-item nav-link active ">TA</a>
            <a href="{% url 'cloudserverlogin' %}" class="nav-item nav-link">CS</a>
        </div>
        <a href="" class="btn btn-primary py-2 px-4">TA</a>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container-xxl py-5 bg-dark hero-header mb-5">
    <div class="container my-5 py-5">
        <div class="row align-items-center g-5">
            <div class="col-lg-6 text-center text-lg-start">
                <h1 class="display-3 text-white animated slideInLeft">TA Login</h1>
                <p class="text-white animated slideInLeft mb-4 pb-2">Login as a TA to securely manage your data.</p>
                {% if msg %}
                <div class="alert alert-danger" role="alert">
                    {{ msg }}
                </div>
                {% endif %}
                <form action="{% url 'TAlogin' %}" method="post">
                    {% csrf_token %}
                    <!-- Include form fields for data owner registration -->
                    <!-- Example: -->
                    <div class="form-group">
                        <label for="name" class="cols-sm-2 control-label">Your Email</label>
                        <div class="cols-sm-10">
                            <div class="input-group">
                                <span class="input-group-addon"><i class="fa fa-user fa" aria-hidden="true"></i></span>
                                <input type="text" class="form-control" name="TAemail" id="TAemail" placeholder="Enter your Email" required />
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email" class="cols-sm-2 control-label">Password</label>
                        <div class="cols-sm-10">
                            <div class="input-group">
                                <span class="input-group-addon"><i class="fa fa-envelope fa" aria-hidden="true"></i></span>
                                <input type="password" class="form-control" name="TApassword" id="TApassword" placeholder="Enter your Password" required />
                            </div>
                        </div>
                    </div>

                    <div class="form-group ">
                        <button type="submit" class="btn btn-primary btn-lg btn-block login-button">login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<!-- JavaScript Libraries -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/lib/wow/wow.min.js"></script>
<script src="/static/lib/easing/easing.min.js"></script>
<script src="/static/lib/waypoints/waypoints.min.js"></script>
<script src="/static/lib/counterup/counterup.min.js"></script>
<script src="/static/lib/owlcarousel/owl.carousel.min.js"></script>
<script src="/static/lib/tempusdominus/static/js/moment.min.js"></script>
<script src="/static/lib/tempusdominus/static/js/moment-timezone.min.js"></script>
<script src="/static/lib/tempusdominus/static/js/tempusdominus-bootstrap-4.min.js"></script>
{% endblock %}
